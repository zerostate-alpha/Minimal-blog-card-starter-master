<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Sora:wght@100..800&display=swap" rel="stylesheet">
    <link rel="icon" href="resources/favicon.ico" type="image/x-icon" sizes="96x96"/>
    <link rel="stylesheet" href="css/style.css">
    <title>devChallenges.io | Minimal Blog Card</title>
  </head>
  <body>

    <!-- Main Container, This will hold the blog card in place to help center -->
     <main>

      <!-- Blog card container this will form into a card containing all essential content -->
       <article class="blog--card">

        <!-- Content container this will keep img, tag, title, and text separate from the Author container -->
        <div class="content--container">

          <!-- Image container this helps with responsiveness with two different size images -->
           <picture>
            <!-- Secondary Image This is small -->
            <source src="/resources/Cactus.jpg" media="">
            <!-- Main Image This is big -->
            <img src="/resources/Cactus@2x.jpg" alt="">
           </picture>

           <!-- Tag: Design -->
            <span>Design</span>
        </div>
       </article>
     </main>
    <!-- Design

  Embracing Minimalism

  From minimalist sculptures to minimalist paintings, this blog will inspire you to appreciate the beauty that lies in simplicity.

  Annie Spratt -->

    <div class="author-info">
      Coded by <a href="#">Sam Walsh</a> | Challenge by
      <a href="https://www.devchallenges.io?ref=challenge" target="_blank" rel="noopener noreferrer">devChallenges.io</a>.
    </div>
  </body>
</html>
