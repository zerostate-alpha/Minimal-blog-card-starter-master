<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Sora:wght@100..800&display=swap" rel="stylesheet">
    <link rel="icon" href="resources/favicon.ico" type="image/x-icon" sizes="96x96"/>
    <link rel="stylesheet" href="css/style.css">
    <title>devChallenges.io | Minimal Blog Card</title>
  </head>
  <body>

      <!-- Blog card container this will form into a card containing all essential content -->
       <article class="blog--card">

        <!-- Content container this will keep img, tag, title, and text separate from the Author container -->
        <div class="content--container">

          <img src="/resources/Cactus@2x.jpg" alt="image of a catus plant">

           <!-- Tag: Design -->
            <p class="tag">Design</p>
            <!-- Blog title -->
            <h1 class="title">Embracing Minimalism</h1>
            <!-- Blog text -->
            <p class="text">From minimalist sculptures to minimalist paintings, this blog will inspire you to appreciate the beauty that lies in simplicity.</p>
        </div>

        <!-- Author container containing author's name -->
        <div class="author--container">
          <p class="author--name">Annie Spratt</p>
        </div>
       </article>
    
  

    <footer class="author-info">
      Coded by <a href="#">Sam Walsh</a> | Challenge by
      <a href="https://www.devchallenges.io?ref=challenge" target="_blank" rel="noopener noreferrer">devChallenges.io</a>.
    </footer>
  </body>
</html>
